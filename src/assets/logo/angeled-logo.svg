<svg viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- Main brand gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A0711"/>
      <stop offset="100%" stop-color="#9E1B32"/>
    </linearGradient>

    <!-- Soft inner glow for the shield -->
    <radialGradient id="shieldGlow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#C0263D" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4A0711" stop-opacity="0"/>
    </radialGradient>

    <!-- Icon background gradient -->
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C0F1E"/>
      <stop offset="100%" stop-color="#7A1020"/>
    </linearGradient>

    <!-- Signal arc gradient -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D9A7AF" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D9A7AF" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4A0711" flood-opacity="0.35"/>
    </filter>

    <!-- Subtle glow for arcs -->
    <filter id="arcGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ============================================================
       ICON MARK
  ============================================================ -->
  <!-- Rounded square background -->
  <rect x="8" y="8" width="144" height="144" rx="32" ry="32" fill="url(#iconBg)" filter="url(#iconShadow)"/>

  <!-- Inner subtle glow -->
  <rect x="8" y="8" width="144" height="144" rx="32" ry="32" fill="url(#shieldGlow)"/>

  <!-- Thin border ring -->
  <rect x="8" y="8" width="144" height="144" rx="32" ry="32" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- ---- HOUSE SILHOUETTE ---- -->
  <!-- Roof -->
  <path d="M80 34 L118 68 L42 68 Z" fill="white" opacity="0.95"/>
  <!-- Roof ridge line -->
  <line x1="80" y1="34" x2="80" y2="34" stroke="none"/>
  <!-- Body of house -->
  <rect x="50" y="68" width="60" height="42" rx="3" fill="white" opacity="0.95"/>
  <!-- Door -->
  <rect x="71" y="85" width="18" height="25" rx="4" fill="#7A1020"/>
  <!-- Door handle -->
  <circle cx="86" cy="98" r="2" fill="rgba(255,255,255,0.7)"/>
  <!-- Left window -->
  <rect x="54" y="74" width="12" height="12" rx="2" fill="#7A1020" opacity="0.9"/>
  <!-- Right window -->
  <rect x="94" y="74" width="12" height="12" rx="2" fill="#7A1020" opacity="0.9"/>

  <!-- ---- WIFI / SIGNAL ARCS (above the roof, centered) ---- -->
  <!-- Arc 1 — smallest, closest -->
  <path d="M72 30 A11 11 0 0 1 88 30"
        fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round"
        opacity="1" filter="url(#arcGlow)"/>
  <!-- Arc 2 — medium -->
  <path d="M65 23 A19 19 0 0 1 95 23"
        fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"
        opacity="0.75" filter="url(#arcGlow)"/>
  <!-- Arc 3 — largest -->
  <path d="M58 16 A27 27 0 0 1 102 16"
        fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round"
        opacity="0.45"/>

  <!-- Signal dot at the base of arcs / apex of roof -->
  <circle cx="80" cy="34" r="3.5" fill="white" opacity="0.9"/>

  <!-- ============================================================
       WORDMARK
  ============================================================ -->
  <!-- "Angeled" — main logotype -->
  <text
    x="174"
    y="103"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="62"
    font-weight="700"
    letter-spacing="-2"
    fill="url(#brandGrad)"
  >Angeled</text>

  <!-- Tagline -->
  <text
    x="176"
    y="128"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="15"
    font-weight="400"
    letter-spacing="3.5"
    fill="#B7A0A5"
    text-anchor="start"
  >ACESSO INTELIGENTE</text>

</svg>
